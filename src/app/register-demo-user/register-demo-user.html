<hr />
<h2>Register User</h2>
<form method="post" #RegisterDemoUser = "ngForm" (ngSubmit) = "registerDemoUser()">
    <div class="form-group">
        <label>UserName : </label>
        <input minlength="5" class="form-control" name="username" [(ngModel)] = "demoUser.username" id="username" #username="ngModel">
        <div *ngIf="username?.invalid && (username?.touched || username.dirty)" class="text-danger small">Username should be minimum of 5 characters</div>
    </div>
 
    <div class="form-group">
        <label>Password : </label>
        <input class="form-control" minlength="8" name="userPassword" type="password" [(ngModel)] = "demoUser.userPassword" id="password" #password = "ngModel" pattern="^(?=.*[A-Za-z])(?=.*\d).+$" required>
        <div *ngIf="password?.invalid && (password?.touched || password?.dirty)" class="text-danger small">
            <div *ngIf = "password.hasError('required')">Password is required</div>
            <div *ngIf = "password.hasError('pattern')">password should be atleast 8 characters minimu one uppercase one lowercase and one number are required</div>
        </div>

    </div>

    <div class="form-group">
        <label>Confirm Password : </label>
        <input class="form-control" name="confirmPassword" type="password" [(ngModel)] = "demoUser.confirmPassword" id="confirmPassword" #confirmPassword = "ngModel" required>
        <div *ngIf="(confirmPassword?.touched || confirmPassword?.dirty) && demoUser.userPassword !== demoUser.confirmPassword" class="text-danger small">Confirm Password should match with password</div>
    </div>


    <div class="form-group">
       <button type="submit" class="btn btn-primary" [disabled] ="!RegisterDemoUser.valid" >Submit</button> 
    </div>

</form>
