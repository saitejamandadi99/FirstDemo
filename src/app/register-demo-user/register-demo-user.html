<hr />
<h2>Register User</h2>
<form method="post" #RegisterDemoUser = "ngForm" (ngSubmit) = "registerDemoUser()">
    <div class="form-group">
        <label>UserName : </label>
        <input class="form-control" name="username" [(ngModel)] = "demoUser.username">
    </div>

    <div class="form-group">
        <label>Password : </label>
        <input class="form-control" name="userPassword" type="password" [(ngModel)] = "demoUser.userPassword">
    </div>

    <div class="form-group">
        <label>Confirm Password : </label>
        <input class="form-control" name="confirmPassword" type="password" [(ngModel)] = "demoUser.confirmPassword">
    </div>

    <div class="form-group">
       <button type="submit" class="btn btn-primary">Submit</button> 
    </div>

</form>
